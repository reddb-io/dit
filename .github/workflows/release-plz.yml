name: release-plz

# Commit-driven semver. release-plz reads the Conventional Commits on main and
# opens a "release" PR that bumps Cargo.toml + CHANGELOG.md. Merging that PR
# creates the version tag — and that tag triggers release.yml (binary builds +
# GitHub Release). Versioning lives here; building/publishing lives in
# release.yml — the same split reddb uses between changesets.yml and release.yml.
#
# No PAT required: tested on this repo, the tag release-plz creates does trigger
# release.yml. (If a future change ever stops that — GitHub's documented rule is
# that GITHUB_TOKEN-pushed tags don't start workflows — the fallback is to add a
# `gh workflow run release.yml` dispatch step here, since workflow_dispatch is
# allowed to fire from GITHUB_TOKEN.)

on:
  push:
    branches: [main]

permissions:
  contents: write       # create the version tag + commit the changelog
  pull-requests: write  # open/update the release PR

concurrency:
  group: release-plz-${{ github.workflow }}
  cancel-in-progress: false

jobs:
  release-plz:
    name: Version from commits
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v6
        with:
          # Full history so release-plz can diff against the last tag.
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@1.95.0

      - name: Run release-plz
        uses: release-plz/action@v0.5
        with:
          config: release-plz.toml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
