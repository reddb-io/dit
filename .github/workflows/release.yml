name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: Version to release, e.g. 0.1.0 (must match Cargo.toml)
        required: true

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  BINARY_NAME: dit

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  plan:
    name: Plan release
    runs-on: blacksmith-4vcpu-ubuntu-2404
    outputs:
      should_skip: ${{ steps.plan.outputs.should_skip }}
      release_tag: ${{ steps.plan.outputs.release_tag }}
      package_version: ${{ steps.plan.outputs.package_version }}
      github_prerelease: ${{ steps.plan.outputs.github_prerelease }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Decide release target
        id: plan
        run: |
          set -euo pipefail
          EVENT="${{ github.event_name }}"
          REF="${{ github.ref }}"
          INPUT_VERSION="${{ github.event.inputs.version || '' }}"
          SHOULD_SKIP=false
          RELEASE_TAG=""
          PACKAGE_VERSION=""

          if [[ "$EVENT" == "push" && "$REF" == refs/tags/v* ]]; then
            RELEASE_TAG="${REF#refs/tags/}"
            PACKAGE_VERSION="${RELEASE_TAG#v}"
          elif [[ "$EVENT" == "workflow_dispatch" ]]; then
            [[ -n "$INPUT_VERSION" ]] || { echo "version input is required"; exit 1; }
            PACKAGE_VERSION="${INPUT_VERSION#v}"
            RELEASE_TAG="v${PACKAGE_VERSION}"
          else
            SHOULD_SKIP=true
          fi

          # Release-blocking guard: the crate version must match the tag, so a
          # published binary's `--version` always equals its release tag.
          if [[ "$SHOULD_SKIP" != "true" ]]; then
            CRATE_VERSION="$(awk -F'"' '/^version = / {print $2; exit}' Cargo.toml)"
            if [[ "$CRATE_VERSION" != "$PACKAGE_VERSION" ]]; then
              echo "::error::Tag ${RELEASE_TAG} resolves to ${PACKAGE_VERSION}, but Cargo.toml is ${CRATE_VERSION}."
              echo "Bump 'version' in Cargo.toml to ${PACKAGE_VERSION}, commit, then re-tag."
              exit 1
            fi
          fi

          {
            echo "should_skip=${SHOULD_SKIP}"
            echo "release_tag=${RELEASE_TAG}"
            echo "package_version=${PACKAGE_VERSION}"
            echo "github_prerelease=false"
          } >> "$GITHUB_OUTPUT"

  build:
    name: Build ${{ matrix.asset_name }}
    needs: [plan]
    if: needs.plan.outputs.should_skip != 'true'
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    continue-on-error: ${{ matrix.optional == true }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # ---- Linux: portable glibc builds via cargo-zigbuild ----------------
          # zig links against an OLD glibc floor (.2.28), so one binary runs on
          # every Ubuntu since 18.04 / Debian 10+ regardless of the runner's own
          # (newer) glibc. libasound stays dynamically resolved on the host.
          - { os: blacksmith-8vcpu-ubuntu-2404,     kind: zig,  target: x86_64-unknown-linux-gnu,        zig_target: x86_64-unknown-linux-gnu.2.28,        asset_name: linux-x86_64 }
          # aarch64 builds natively on a Blacksmith ARM runner (no cross gcc).
          - { os: blacksmith-8vcpu-ubuntu-2404-arm, kind: zig,  target: aarch64-unknown-linux-gnu,       zig_target: aarch64-unknown-linux-gnu.2.28,       asset_name: linux-aarch64 }
          # armv7 (32-bit ARM) cross-compiled from x86_64 — best-effort.
          - { os: blacksmith-8vcpu-ubuntu-2404,     kind: zig,  target: armv7-unknown-linux-gnueabihf,   zig_target: armv7-unknown-linux-gnueabihf.2.28,   asset_name: linux-armv7,  arm_cross: true, smoke: false, optional: true }

          # ---- Linux: fully-static musl builds (run anywhere, even sans glibc)-
          # ALSA is statically linked into the binary inside the musl container.
          # Best-effort: failures here never block the release (the zig builds
          # already cover every modern distro); the installer falls back to them.
          - { os: blacksmith-8vcpu-ubuntu-2404,     kind: musl, target: x86_64-unknown-linux-musl,       musl_image: x86_64-musl,  musl_host: x86_64-linux-musl,  asset_name: linux-x86_64-static,  optional: true }
          - { os: blacksmith-8vcpu-ubuntu-2404,     kind: musl, target: aarch64-unknown-linux-musl,      musl_image: aarch64-musl, musl_host: aarch64-linux-musl, asset_name: linux-aarch64-static, smoke: false, optional: true }

          # ---- macOS: native ARM, cross-built Intel from the same ARM pool ----
          - { os: macos-14,       kind: native, target: aarch64-apple-darwin,  asset_name: macos-aarch64,  optional: true }
          - { os: macos-14,       kind: native, target: x86_64-apple-darwin,   asset_name: macos-x86_64,   smoke: false, optional: true }
          # ---- Windows x86_64 ------------------------------------------------
          - { os: windows-latest, kind: native, target: x86_64-pc-windows-msvc, asset_name: windows-x86_64, optional: true }
    steps:
      - uses: actions/checkout@v6

      # zig builds need libasound for the target arch (alsa-sys probes it via
      # pkg-config). x86_64/aarch64 use the native dev package; armv7 pulls the
      # armhf one through a foreign dpkg architecture.
      - name: Install ALSA dev (native arch)
        if: matrix.kind == 'zig' && !matrix.arm_cross
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev pkg-config

      - name: Install ALSA dev (armhf cross)
        if: matrix.kind == 'zig' && matrix.arm_cross
        run: |
          sudo dpkg --add-architecture armhf
          sudo apt-get update
          sudo apt-get install -y pkg-config libasound2-dev:armhf

      - uses: dtolnay/rust-toolchain@1.95.0
        if: matrix.kind != 'musl'
        with:
          targets: ${{ matrix.target }}

      - name: Install cargo-zigbuild
        if: matrix.kind == 'zig'
        run: pipx install cargo-zigbuild

      - uses: Swatinem/rust-cache@v2
        if: matrix.kind != 'musl'
        with:
          shared-key: release-${{ matrix.target }}
          cache-on-failure: "true"

      # --- glibc-portable build (zig) -------------------------------------------
      - name: Build (zigbuild)
        if: matrix.kind == 'zig'
        env:
          # Cross-link armv7 against the armhf libasound in the foreign sysroot.
          PKG_CONFIG_ALLOW_CROSS: ${{ matrix.arm_cross && '1' || '' }}
          PKG_CONFIG_PATH: ${{ matrix.arm_cross && '/usr/lib/arm-linux-gnueabihf/pkgconfig' || '' }}
        run: cargo zigbuild --locked --release --features local --target ${{ matrix.zig_target }} --bin dit

      # --- static musl build (Docker) ------------------------------------------
      - name: Build (musl + static ALSA)
        if: matrix.kind == 'musl'
        env:
          MUSL_IMAGE: ${{ matrix.musl_image }}
          MUSL_HOST: ${{ matrix.musl_host }}
          MUSL_TARGET: ${{ matrix.target }}
        run: |
          docker run --rm -v "${PWD}:/volume" -w /volume \
            -e MUSL_HOST -e MUSL_TARGET \
            "messense/rust-musl-cross:${MUSL_IMAGE}" bash -lc '
              set -euo pipefail
              rm -f rust-toolchain.toml
              # Build a static libasound for the musl target so alsa-sys links it in.
              ALSA_VER=1.2.11
              curl -sSL "https://www.alsa-project.org/files/pub/lib/alsa-lib-${ALSA_VER}.tar.bz2" -o /tmp/alsa.tar.bz2
              mkdir -p /tmp/alsa && tar xf /tmp/alsa.tar.bz2 -C /tmp/alsa --strip-components=1
              cd /tmp/alsa
              ./configure --host="${MUSL_HOST}" --enable-static --disable-shared \
                --disable-python --without-debug --prefix=/musl-alsa CC="${TARGET_CC:-${MUSL_HOST}-gcc}"
              make -j"$(nproc)" >/dev/null && make install >/dev/null
              cd /volume
              export PKG_CONFIG_PATH=/musl-alsa/lib/pkgconfig
              export PKG_CONFIG_ALLOW_CROSS=1
              export ALSA_STATIC=1
              export RUSTFLAGS="-C target-feature=+crt-static"
              cargo build --locked --release --features local --target "${MUSL_TARGET}" --bin dit
            '
          sudo chown -R "$(id -u):$(id -g)" "target/${{ matrix.target }}"

      # --- native build (macOS / Windows) --------------------------------------
      - name: Build (native)
        if: matrix.kind == 'native'
        run: cargo build --locked --release --features local --target ${{ matrix.target }} --bin dit

      - name: Package asset
        shell: bash
        run: |
          EXT=""; [[ "${{ matrix.target }}" == *windows* ]] && EXT=".exe"
          ASSET="dit-${{ matrix.asset_name }}${EXT}"
          cp "target/${{ matrix.target }}/release/dit${EXT}" "${ASSET}"
          shasum -a 256 "${ASSET}" > "${ASSET}.sha256" 2>/dev/null \
            || certutil -hashfile "${ASSET}" SHA256 > "${ASSET}.sha256"

      - name: Smoke test
        if: ${{ matrix.smoke != false }}
        shell: bash
        run: |
          EXT=""; [[ "${{ matrix.target }}" == *windows* ]] && EXT=".exe"
          ./"dit-${{ matrix.asset_name }}${EXT}" --version

      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.asset_name }}
          path: |
            dit-${{ matrix.asset_name }}*

  publish-github:
    name: GitHub Release
    needs: [plan, build]
    if: needs.plan.outputs.should_skip != 'true'
    runs-on: blacksmith-4vcpu-ubuntu-2404
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          # git-cliff walks the full history to build the changelog.
          fetch-depth: 0

      - uses: actions/download-artifact@v8
        with:
          path: release
          merge-multiple: true

      - name: Generate changelog from commits
        uses: orhun/git-cliff-action@v4
        id: changelog
        with:
          config: cliff.toml
          args: --unreleased --tag ${{ needs.plan.outputs.release_tag }} --strip header
        env:
          OUTPUT: release-changelog.md
          GITHUB_REPO: ${{ github.repository }}

      - name: Compose release body
        env:
          TAG: ${{ needs.plan.outputs.release_tag }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          CHANGELOG="$(cat release-changelog.md)"
          cat > release-body.md <<MARKDOWN
          # dit ${TAG}

          Push-to-toggle voice dictation — speak, and the transcript is typed into the focused app.

          ${CHANGELOG}

          ---

          ## Install

          **One-liner — Linux / macOS:**
          \`\`\`bash
          curl -fsSL https://raw.githubusercontent.com/${REPO}/main/install.sh | bash
          \`\`\`

          **One-liner — Windows (PowerShell):**
          \`\`\`powershell
          irm https://raw.githubusercontent.com/${REPO}/main/install.ps1 | iex
          \`\`\`

          Already installed? \`dit update\` refreshes to the latest release (and is a
          no-op when you're already current; \`dit update --check\` only reports).

          Or download a binary directly, make it executable, and put it on your \`PATH\`:

          **Linux (x86_64):**
          \`\`\`bash
          curl -fsSL https://github.com/${REPO}/releases/download/${TAG}/dit-linux-x86_64 -o dit && chmod +x dit
          \`\`\`

          **Linux (aarch64):**
          \`\`\`bash
          curl -fsSL https://github.com/${REPO}/releases/download/${TAG}/dit-linux-aarch64 -o dit && chmod +x dit
          \`\`\`

          The Linux \`x86_64\`/\`aarch64\`/\`armv7\` builds are glibc-portable (built against
          glibc 2.28 — runs on every Ubuntu since 18.04). On a glibc older than that, or a
          musl distro (Alpine), grab the fully-static variant instead:
          \`dit-linux-x86_64-static\` / \`dit-linux-aarch64-static\`. The install script
          and \`dit update\` pick the right one for your host automatically.

          **macOS (Apple Silicon):**
          \`\`\`bash
          curl -fsSL https://github.com/${REPO}/releases/download/${TAG}/dit-macos-aarch64 -o dit && chmod +x dit
          xattr -d com.apple.quarantine dit   # clear Gatekeeper
          \`\`\`

          **macOS (Intel):** \`dit-macos-x86_64\` · **Linux (armv7):** \`dit-linux-armv7\` · **Windows:** \`dit-windows-x86_64.exe\`

          Each asset ships a \`.sha256\` sidecar — verify with \`shasum -a 256 -c dit-<asset>.sha256\`.

          ## Configure

          \`\`\`bash
          echo 'ELEVENLABS_API_KEY=sk_your_key_here' > ~/.dit.env
          \`\`\`

          Run \`dit\`, press **F9**, speak, press **F9** again. See the [README](https://github.com/${REPO}#readme) for platform notes.
          MARKDOWN
          echo "---- composed body ----"
          cat release-body.md

      - name: Create release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.plan.outputs.release_tag }}
          name: dit ${{ needs.plan.outputs.release_tag }}
          body_path: release-body.md
          prerelease: ${{ needs.plan.outputs.github_prerelease }}
          files: release/*
          token: ${{ secrets.GITHUB_TOKEN }}
