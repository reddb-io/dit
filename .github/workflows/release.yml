name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: Version to release, e.g. 0.1.0 (must match Cargo.toml)
        required: true

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  BINARY_NAME: dit

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  plan:
    name: Plan release
    runs-on: blacksmith-4vcpu-ubuntu-2404
    outputs:
      should_skip: ${{ steps.plan.outputs.should_skip }}
      release_tag: ${{ steps.plan.outputs.release_tag }}
      package_version: ${{ steps.plan.outputs.package_version }}
      github_prerelease: ${{ steps.plan.outputs.github_prerelease }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Decide release target
        id: plan
        run: |
          set -euo pipefail
          EVENT="${{ github.event_name }}"
          REF="${{ github.ref }}"
          INPUT_VERSION="${{ github.event.inputs.version || '' }}"
          SHOULD_SKIP=false
          RELEASE_TAG=""
          PACKAGE_VERSION=""

          if [[ "$EVENT" == "push" && "$REF" == refs/tags/v* ]]; then
            RELEASE_TAG="${REF#refs/tags/}"
            PACKAGE_VERSION="${RELEASE_TAG#v}"
          elif [[ "$EVENT" == "workflow_dispatch" ]]; then
            [[ -n "$INPUT_VERSION" ]] || { echo "version input is required"; exit 1; }
            PACKAGE_VERSION="${INPUT_VERSION#v}"
            RELEASE_TAG="v${PACKAGE_VERSION}"
          else
            SHOULD_SKIP=true
          fi

          # Release-blocking guard: the crate version must match the tag, so a
          # published binary's `--version` always equals its release tag.
          if [[ "$SHOULD_SKIP" != "true" ]]; then
            CRATE_VERSION="$(awk -F'"' '/^version = / {print $2; exit}' Cargo.toml)"
            if [[ "$CRATE_VERSION" != "$PACKAGE_VERSION" ]]; then
              echo "::error::Tag ${RELEASE_TAG} resolves to ${PACKAGE_VERSION}, but Cargo.toml is ${CRATE_VERSION}."
              echo "Bump 'version' in Cargo.toml to ${PACKAGE_VERSION}, commit, then re-tag."
              exit 1
            fi
          fi

          {
            echo "should_skip=${SHOULD_SKIP}"
            echo "release_tag=${RELEASE_TAG}"
            echo "package_version=${PACKAGE_VERSION}"
            echo "github_prerelease=false"
          } >> "$GITHUB_OUTPUT"

  build:
    name: Build ${{ matrix.asset_name }}
    needs: [plan]
    if: needs.plan.outputs.should_skip != 'true'
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    continue-on-error: ${{ matrix.optional == true }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x86_64: native compile on a Blacksmith 8-vCPU runner.
          - { os: blacksmith-8vcpu-ubuntu-2404,     target: x86_64-unknown-linux-gnu,  asset_name: linux-x86_64,  cross: false }
          # Linux aarch64: build natively on a Blacksmith ARM runner (no cross gcc).
          - { os: blacksmith-8vcpu-ubuntu-2404-arm, target: aarch64-unknown-linux-gnu, asset_name: linux-aarch64, cross: false }
          # macOS: native ARM, cross-built Intel from the same ARM pool.
          - { os: macos-14,       target: aarch64-apple-darwin,  asset_name: macos-aarch64,  cross: false, optional: true }
          - { os: macos-14,       target: x86_64-apple-darwin,   asset_name: macos-x86_64,   cross: true,  smoke: false, optional: true }
          # Windows x86_64.
          - { os: windows-latest, target: x86_64-pc-windows-msvc, asset_name: windows-x86_64, cross: false, optional: true }
    steps:
      - uses: actions/checkout@v6

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev libxdo-dev libxi-dev libxtst-dev \
            libdbus-1-dev pkg-config

      - uses: dtolnay/rust-toolchain@1.95.0
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-${{ matrix.target }}
          cache-on-failure: "true"

      - name: Build
        run: cargo build --locked --release --target ${{ matrix.target }} --bin dit

      - name: Strip (Linux native)
        if: runner.os == 'Linux'
        run: strip target/${{ matrix.target }}/release/dit

      - name: Package asset
        shell: bash
        run: |
          EXT=""; [[ "${{ matrix.target }}" == *windows* ]] && EXT=".exe"
          ASSET="dit-${{ matrix.asset_name }}${EXT}"
          cp "target/${{ matrix.target }}/release/dit${EXT}" "${ASSET}"
          shasum -a 256 "${ASSET}" > "${ASSET}.sha256" 2>/dev/null \
            || certutil -hashfile "${ASSET}" SHA256 > "${ASSET}.sha256"

      - name: Smoke test
        if: ${{ !matrix.cross && matrix.smoke != false }}
        shell: bash
        run: |
          EXT=""; [[ "${{ matrix.target }}" == *windows* ]] && EXT=".exe"
          ./"dit-${{ matrix.asset_name }}${EXT}" --version

      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.asset_name }}
          path: |
            dit-${{ matrix.asset_name }}*

  publish-github:
    name: GitHub Release
    needs: [plan, build]
    if: needs.plan.outputs.should_skip != 'true'
    runs-on: blacksmith-4vcpu-ubuntu-2404
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          # git-cliff walks the full history to build the changelog.
          fetch-depth: 0

      - uses: actions/download-artifact@v8
        with:
          path: release
          merge-multiple: true

      - name: Generate changelog from commits
        uses: orhun/git-cliff-action@v4
        id: changelog
        with:
          config: cliff.toml
          args: --unreleased --tag ${{ needs.plan.outputs.release_tag }} --strip header
        env:
          OUTPUT: release-changelog.md
          GITHUB_REPO: ${{ github.repository }}

      - name: Compose release body
        env:
          TAG: ${{ needs.plan.outputs.release_tag }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          CHANGELOG="$(cat release-changelog.md)"
          cat > release-body.md <<MARKDOWN
          # dit ${TAG}

          Push-to-toggle voice dictation — speak, and the transcript is typed into the focused app.

          ${CHANGELOG}

          ---

          ## Install

          **One-liner — Linux / macOS:**
          \`\`\`bash
          curl -fsSL https://raw.githubusercontent.com/${REPO}/main/install.sh | bash
          \`\`\`

          **One-liner — Windows (PowerShell):**
          \`\`\`powershell
          irm https://raw.githubusercontent.com/${REPO}/main/install.ps1 | iex
          \`\`\`

          Or download a binary directly, make it executable, and put it on your \`PATH\`:

          **Linux (x86_64):**
          \`\`\`bash
          curl -fsSL https://github.com/${REPO}/releases/download/${TAG}/dit-linux-x86_64 -o dit && chmod +x dit
          \`\`\`

          **Linux (aarch64):**
          \`\`\`bash
          curl -fsSL https://github.com/${REPO}/releases/download/${TAG}/dit-linux-aarch64 -o dit && chmod +x dit
          \`\`\`

          **macOS (Apple Silicon):**
          \`\`\`bash
          curl -fsSL https://github.com/${REPO}/releases/download/${TAG}/dit-macos-aarch64 -o dit && chmod +x dit
          xattr -d com.apple.quarantine dit   # clear Gatekeeper
          \`\`\`

          **macOS (Intel):** \`dit-macos-x86_64\` · **Windows:** \`dit-windows-x86_64.exe\`

          Each asset ships a \`.sha256\` sidecar — verify with \`shasum -a 256 -c dit-<asset>.sha256\`.

          ## Configure

          \`\`\`bash
          echo 'ELEVENLABS_API_KEY=sk_your_key_here' > ~/.dit.env
          \`\`\`

          Run \`dit\`, press **F9**, speak, press **F9** again. See the [README](https://github.com/${REPO}#readme) for platform notes.
          MARKDOWN
          echo "---- composed body ----"
          cat release-body.md

      - name: Create release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.plan.outputs.release_tag }}
          name: dit ${{ needs.plan.outputs.release_tag }}
          body_path: release-body.md
          prerelease: ${{ needs.plan.outputs.github_prerelease }}
          files: release/*
          token: ${{ secrets.GITHUB_TOKEN }}
